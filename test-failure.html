<!DOCTYPE html><html lang="fr"><head><style id="critical-css">
/* Variables CSS critiques - Minimales pour FCP */
:root {
  --background: 0 0% 100%;
  --foreground: 220 40% 10%;
  --primary: 217 91% 60%;
  --primary-foreground: 0 0% 100%;
  --border: 0 0% 90%;
  --radius: 0.5rem;
}

/* Reset minimal */
*,::before,::after {
  box-sizing: border-box;
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size: 1rem;
  line-height: 1.625;
  margin: 0;
  background-color: hsl(var(--background));
  color: hsl(var(--foreground));
  overflow-x: hidden;
}

#root {
  min-height: 100vh;
}

/* Container minimal */
.container {
  width: 100%;
  margin: 0 auto;
  padding: 0 1rem;
}

/* Typographie critique */
h1,h2,h3 {
  font-weight: 600;
  line-height: 1.2;
  margin: 0;
}

/* Images critiques */
img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Boutons critiques */
button {
  min-height: 44px;
  min-width: 44px;
  touch-action: manipulation;
}

/* Focus visible */
*:focus-visible {
  outline: 3px solid hsl(var(--primary));
  outline-offset: 2px;
}

  transform: scale(1) translateY(0);
  transition:

    transform 0.3s;
}

  transform: scale(1) translateY(0);

/**
 * Mobile-First Design System
 * Système de design optimisé pour mobile avec scaling progressif vers desktop

  --spacing-xs: 0.25rem; /* 4px */
  --spacing-sm: 0.5rem; /* 8px */
  --spacing-md: 0.75rem; /* 12px */
  --spacing-base: 1rem; /* 16px */
  --spacing-lg: 1.5rem; /* 24px */
  --spacing-xl: 2rem; /* 32px */

  --safe-area-left: env(safe-area-inset-left, 0px);
  --safe-area-right: env(safe-area-inset-right, 0px);

  /* Container padding mobile-first */

  --container-padding-tablet: 1.5rem; /* 24px */
  --container-padding-desktop: 2rem; /* 32px */

  --touch-target-comfortable: 48px;

  /* Border radius mobile */
  --radius-sm: 0.375rem; /* 6px */
  --radius-base: 0.5rem; /* 8px */
  --radius-lg: 0.75rem; /* 12px */
  --radius-xl: 1rem; /* 16px */

</style><style type="text/css" data-vite-dev-id="C:/emarzona/src/styles/product-banners.css">/* ============================================================
   OPTIMISATION DES BANNIÈRES PRODUITS - EMARZONA
   Version Professionnelle - Inspirée des grandes plateformes
   ============================================================ */

/* Variables CSS pour la cohérence et la performance - Style ComeUp/Fiverr */
:root {
  /* Ratio par défaut des bannières aligné sur le format produit 1536×1024 (3:2) */
  --product-banner-aspect-ratio: 3/2;
  --mobile-margin: 0.125rem;
  --tablet-margin: 1rem;
  --desktop-margin: 1.5rem;
  --border-radius-mobile: 0.75rem;
  --border-radius-tablet: 1rem;
  --border-radius-desktop: 1.25rem;
  --transition-duration: 300ms;
  /* Ombres supprimées pour affichage statique et professionnel */
}

/* Container principal pour les cartes produits - Optimisé pour toutes les plateformes */
.product-card-container {
  width: 100%;
  /* Prévention du CLS et optimisation GPU */
  contain: layout style;
  transform: translateZ(0);
  will-change: transform;
}

/* Container de bannière avec optimisations avancées */
.product-banner-container {
  position: relative;
  width: 100%;
  /* Optimisation GPU */
  transform: translateZ(0);
  will-change: transform;
}

/* Bannière produit avec ratio 3:2 professionnel */
.product-banner {
  position: relative;
  width: 100%;
  overflow: hidden;
  aspect-ratio: var(--product-banner-aspect-ratio);
  /* Qualité d'affichage optimisée */
  image-rendering: high-quality;
  -webkit-image-rendering: high-quality;
  /* Optimisation GPU */
  transform: translateZ(0);
  will-change: transform;
}

/* Image optimisée avec rendu professionnel statique - Pas d'ombres, pas d'animations - Stable et optimisée */
.product-banner img {
  height: 100%;
  width: 100%;
  -o-object-fit: cover;
     object-fit: cover;
  /* Qualité d'affichage optimisée - Images nettes */
  image-rendering: high-quality;
  -webkit-image-rendering: high-quality;
  /* Centrage parfait de l'image */
  -o-object-position: center;
     object-position: center;
  /* Prévention du CLS */
  contain: layout;
  /* Coins arrondis pour l'image */
  border-radius: inherit;
  /* Pas d'ombres, affichage statique */
  box-shadow: none !important;
  filter: none;
  /* S'assurer que l'image reste visible lors du scroll sur mobile */
  position: relative !important;
  z-index: 1 !important;
  visibility: visible !important;
  opacity: 1 !important;
  display: block !important;
  /* Stabilité garantie - pas de transformations */
  transform: none !important;
  /* Optimisation performance */
  will-change: auto;
  backface-visibility: visible;
  -webkit-backface-visibility: visible;
}

/* Overlay gradient pour les effets visuels */
.product-banner-overlay {
  position: absolute;
  inset: 0px;
  background-image: linear-gradient(to top, var(--tw-gradient-stops));
  --tw-gradient-from: rgb(0 0 0 / 0.6) var(--tw-gradient-from-position);
  --tw-gradient-to: rgb(0 0 0 / 0) var(--tw-gradient-to-position);
  --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to);
  --tw-gradient-to: rgb(0 0 0 / 0)  var(--tw-gradient-to-position);
  --tw-gradient-stops: var(--tw-gradient-from), transparent var(--tw-gradient-via-position), var(--tw-gradient-to);
  --tw-gradient-to: transparent var(--tw-gradient-to-position);
  opacity: 0;
  transition-property: opacity;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  transition-duration: 300ms;
  animation-duration: 300ms;
}

.product-card:hover .product-banner-overlay {
  opacity: 1;
}

/* Badges de promotion */
.product-badge {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  /* Optimisation GPU */
  transform: translateZ(0);
  will-change: transform;
}

/* Actions hover */
.product-actions {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  --tw-translate-x: 0.5rem;
  transform: translate(var(--tw-translate-x), var(--tw-translate-y)) rotate(var(--tw-rotate)) skewX(var(--tw-skew-x)) skewY(var(--tw-skew-y)) scaleX(var(--tw-scale-x)) scaleY(var(--tw-scale-y));
  opacity: 0;
  transition-property: all;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  transition-duration: 300ms;
  animation-duration: 300ms;
  /* Optimisation GPU */
  transform: translateZ(0) translateX(8px);
  will-change: transform, opacity;
}

.product-card:hover .product-actions {
  opacity: 1;
  transform: translateZ(0) translateX(0);
}

/* ============================================================
   RESPONSIVE DESIGN - MOBILE FIRST
   ============================================================ */

/* Mobile (< 640px) - 1 produit par ligne - Affichage exact */
@media (max-width: 639px) {
  .product-card-container {
    width: 96%;
    margin-left: auto;
    margin-right: auto;
  }

  .product-banner {
    border-radius: var(--border-radius-mobile);
    /* Largeur 96% pour une meilleure utilisation de l'espace mobile */
    width: 96%;
    margin: 0 auto;
  }

  /* Grille mobile - EXACTEMENT 1 produit par ligne */
  .products-grid-mobile {
    display: grid;
    grid-template-columns: repeat(1, minmax(0, 1fr));
    gap: 1.5rem;
    padding-left: 2%;
    padding-right: 2%;
    /* Optimisation GPU */
    transform: translateZ(0);
    will-change: transform;
  }

  /* Cartes produits mobile - Design professionnel */
  .product-card-mobile {
    margin-left: 0px;
    margin-right: 0px;
    width: 96%;
    margin-left: auto;
    margin-right: auto;
    box-shadow: none;
    border-radius: var(--border-radius-mobile);
    background: transparent;
    /* Effet de profondeur */
    transform: translateZ(0);
    will-change: transform;
    /* Hauteur uniforme exacte */
    height: 480px;
    min-height: 480px;
    max-height: 480px;
  }

  /* Contenu des cartes mobile */
  .product-card-content-mobile {
    padding: 1rem;
  }

  /* Boutons mobile - Style moderne */
  .product-button-mobile {
    width: 100%;
    padding-top: 0.75rem;
    padding-bottom: 0.75rem;
    padding-left: 1rem;
    padding-right: 1rem;
    font-size: 0.875rem;
    line-height: 1.375rem;
    letter-spacing: 0;
    border-radius: var(--border-radius-mobile);
    font-weight: 600;
    /* Optimisation GPU */
    transform: translateZ(0);
    will-change: transform;
  }
}

/* Tablet (640px - 1024px) - EXACTEMENT 2 produits par ligne */
@media (min-width: 640px) and (max-width: 1023px) {
  .product-card-container {
    margin-left: var(--tablet-margin);
    margin-right: var(--tablet-margin);
  }

  .product-banner {
    border-radius: var(--border-radius-tablet);
  }

  /* Grille tablette - EXACTEMENT 2 produits par ligne */
  .products-grid-tablet {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 2rem;
    padding-left: var(--tablet-margin);
    padding-right: var(--tablet-margin);
    /* Optimisation GPU */
    transform: translateZ(0);
    will-change: transform;
  }

  /* Cartes produits tablette */
  .product-card-tablet {
    box-shadow: none;
    border-radius: var(--border-radius-tablet);
    background: transparent;
    /* Hauteur uniforme exacte */
    height: 520px;
    min-height: 520px;
    max-height: 520px;
    transition: all var(--transition-duration) cubic-bezier(0.4, 0, 0.2, 1);
    /* Optimisation GPU */
    transform: translateZ(0);
    will-change: transform;
  }

  /* Pas d'effet hover - Affichage statique */
  .product-card-tablet:hover {
    transform: none;
    box-shadow: none;
  }
}

/* Desktop (> 1024px) - EXACTEMENT 3 produits par ligne */
@media (min-width: 1024px) {
  .product-card-container {
    margin-left: var(--desktop-margin);
    margin-right: var(--desktop-margin);
  }

  .product-banner {
    border-radius: var(--border-radius-desktop);
    /* Optimisation pour le ratio 1920x1080 */
    max-width: 100%;
    height: auto;
  }

  /* Grille desktop - EXACTEMENT 3 produits par ligne */
  .products-grid-desktop {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 2rem;
    padding-left: var(--desktop-margin);
    padding-right: var(--desktop-margin);
    /* Optimisation GPU */
    transform: translateZ(0);
    will-change: transform;
  }

  /* Affichage statique et professionnel pour desktop - Pas d'ombres */
  .product-card-desktop {
    box-shadow: none;
    border-radius: var(--border-radius-desktop);
    background: transparent;
    /* Hauteur uniforme exacte */
    height: 560px;
    min-height: 560px;
    max-height: 560px;
  }

  /* Pas d'effet hover - Affichage statique */
  .product-card-desktop:hover {
    transform: none;
    box-shadow: none;
  }

  /* Optimisation pour les écrans ultra-larges - Maintenir EXACTEMENT 3 colonnes */
  @media (min-width: 1920px) {
    .products-grid-desktop {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
  }
}

/* ============================================================
   STYLES UNIFORMES POUR LES CARTES PRODUITS
   ============================================================ */

/* Hauteur uniforme pour toutes les cartes - Garantie exacte */
.product-card {
  display: flex;
  flex-direction: column;
  background: transparent;
  /* Hauteur minimale pour éviter les décalages */
  min-height: 480px;
  /* Optimisation GPU */
  transform: translateZ(0);
