<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="theme-color" content="#08080a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- ✅ Performance optimizations -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="format-detection" content="telephone=no" />
    
    <link rel="manifest" href="/manifest.json" />

    <!-- Icônes Emarzona (PWA + installation) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" id="favicon-default" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <title>Emarzona — Vendez tout. Gérez tout. Sans limites.</title>
    <meta name="description" content="Plateforme e-commerce premium : produits digitaux, physiques, services, cours et œuvres d'artiste. Paiements sécurisés, marketing intégré, marketplace Afrique.">
    <meta name="author" content="Emarzona" />
    <!-- Canonical et hreflang sont injectés dynamiquement par AutoSEO/react-helmet-async
         pour s'adapter au domaine réel servi (preview, custom domain). -->

    <!-- ✅ Resource Hints pour améliorer les Core Web Vitals -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Polices dashboard : Inter via index.css. Landing : Cormorant + DM Sans chargées dans Landing.tsx -->
    <link rel="preconnect" href="https://hbdnzajbyjakdhuavrvb.supabase.co" />
    <link rel="preconnect" href="https://storage.googleapis.com" />
    <link rel="preconnect" href="https://api.moneroo.com" />

    <!-- ✅ Prefetch pour routes critiques (améliore la navigation) -->
    <!-- Note: React Router gère déjà le prefetch via lazy loading -->
    <!-- Les prefetch de routes sont gérés dynamiquement par usePrefetchRoutes et useIntelligentPrefetch -->

    <!-- ✅ Open Graph (Facebook, WhatsApp, LinkedIn...) -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Emarzona" />
