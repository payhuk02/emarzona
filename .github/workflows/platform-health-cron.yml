# Secours si pg_cron indisponible — sonde SLA platform-health
name: Platform health cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run platform-health probe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "SUPABASE_URL and CRON_SECRET secrets are required."
            exit 0
          fi
          curl -sfS -X POST "${SUPABASE_URL%/}/functions/v1/platform-health" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -d '{}' \
            --max-time 120
