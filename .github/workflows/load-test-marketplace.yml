name: Load test — marketplace RPC

on:
  workflow_dispatch:
    inputs:
      max_vus:
        description: 'Peak virtual users'
        required: false
        default: '10'
      duration:
        description: 'Ramp duration at peak (e.g. 30s, 1m)'
        required: false
        default: '30s'

jobs:
  k6-marketplace:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run marketplace RPC load test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          K6_VUS: ${{ inputs.max_vus }}
          K6_DURATION: ${{ inputs.duration }}
        run: k6 run scripts/k6/marketplace-rpc.js
