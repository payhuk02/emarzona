name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck:
    name: Typecheck (${{ matrix.target.name }})
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Critical
            script: typecheck:critical
          - name: Auth Admin
            script: typecheck:auth-admin
          - name: Commerce Core
            script: typecheck:commerce-core
          - name: Marketplace Core
            script: typecheck:marketplace-core
          - name: Ops Core
            script: typecheck:ops-core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck target
        run: npm run ${{ matrix.target.script }}

  test-unit:
    name: Unit Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:ci
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'mock-key' }}

      - name: Run navigation tests
        run: npm run test:navigation
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'mock-key' }}

      - name: Check coverage thresholds
        run: |
          # Vérifier que la couverture respecte les seuils CI progressifs configurés dans vitest.config.ts
          # Vitest échouera automatiquement si les seuils ne sont pas atteints
          echo "✅ Coverage check passed - CI thresholds enforced"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unit
          name: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}

  # E2E tests are handled by .github/workflows/playwright.yml
  # This job is disabled to avoid duplicate test runs
  # test-e2e:
  #   name: E2E Tests
  #   timeout-minutes: 30
  #   runs-on: ubuntu-latest
  #   if: false  # Disabled - use playwright.yml instead

  security-gates:
    name: Security & Architecture Gates
    timeout-minutes: 10
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Phase 0
        run: npm run verify:phase0

      - name: Audit Security Gates
        run: npm run audit:security-gates

  lint:
    name: Lint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter (phase 3 budget)
        run: npm run lint:ci

      - name: Check shell heavy imports
        run: npm run check:shell-imports

  build:
    name: Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and enforce bundle budgets
        run: npm run build:check
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'mock-key' }}

  edge-functions:
    name: Edge Functions Check
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check (Stripe / Payment V2 Edge Functions)
        run: |
          deno fmt --check \
            supabase/functions/_shared/stripe-api.ts \
            supabase/functions/stripe-tax-calculate/index.ts \
            supabase/functions/stripe-create-checkout/index.ts \
            supabase/functions/stripe-connect-onboard/index.ts \
            supabase/functions/stripe-connect-webhook/index.ts \
            supabase/functions/stripe-refund/index.ts

      - name: Type check email workflow Edge Functions
        run: |
          deno check --config supabase/functions/deno.json supabase/functions/_shared/workflow-executor.ts
          deno check --config supabase/functions/deno.json supabase/functions/_shared/post-order-payment-fulfillment.ts
          deno check --config supabase/functions/deno.json supabase/functions/trigger-email-workflows/index.ts
          deno check --config supabase/functions/deno.json supabase/functions/execute-email-workflow/index.ts

      - name: Type check Payment V2 / Stripe Tax Edge Functions
        run: |
          deno check --config supabase/functions/deno.json supabase/functions/_shared/stripe-api.ts
          deno check --config supabase/functions/deno.json supabase/functions/stripe-tax-calculate/index.ts
          deno check --config supabase/functions/deno.json supabase/functions/stripe-create-checkout/index.ts

      - name: Run Edge Functions Contract Tests
        run: |
          deno test --allow-env --allow-net --config supabase/functions/deno.json supabase/functions/gdpr-export/index.test.ts
          deno test --allow-env --config supabase/functions/deno.json supabase/functions/stripe-tax-calculate/index.test.ts

