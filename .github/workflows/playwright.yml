name: Playwright Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Setup environment variables
      run: |
        echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_TEST_URL || secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}" >> $GITHUB_ENV
        echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'mock-key' }}" >> $GITHUB_ENV
    
    - name: Verify Supabase publishable key format
      run: npm run verify:supabase-keys
      env:
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_ci_mock' }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_ci_mock' }}

    - name: Run Playwright tests
      run: npm run test:e2e:ci
      env:
        CI: true
        VITE_PAYMENT_ORCHESTRATION_V2: 'true'
        VITE_PAYMENT_ORCHESTRATION_V2_ROLLOUT: '100'
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_TEST_URL || secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_ci_mock' }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_ci_mock' }}
      # ✅ ACTIVÉ: Les tests bloquent maintenant les PR si ils échouent
      # Retirer continue-on-error pour activer les tests en CI/CD
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    - name: Upload test videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-videos
        path: test-results/
        retention-days: 7

  test-commerce-type-gating:
    name: Commerce type gating E2E (5 types)
    timeout-minutes: 25
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate commerce E2E secrets
      id: commerce_e2e_secrets
      run: node scripts/verify-commerce-e2e-secrets.mjs
      env:
        CI: true
        VITE_SUPABASE_TEST_URL: ${{ secrets.VITE_SUPABASE_TEST_URL }}
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_TEST_URL || secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}

    - name: Install Playwright Browsers
      if: steps.commerce_e2e_secrets.outputs.skipped != 'true'
      run: npx playwright install --with-deps chromium

    - name: Run commerce type gating E2E
      if: steps.commerce_e2e_secrets.outputs.skipped != 'true'
      run: npm run test:e2e:commerce-gating
      env:
        CI: true
        VITE_SUPABASE_TEST_URL: ${{ secrets.VITE_SUPABASE_TEST_URL }}
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_TEST_URL || secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}

    - name: Run commerce gating contract tests (E2E skipped)
      if: steps.commerce_e2e_secrets.outputs.skipped == 'true'
      run: npm run test:commerce-gating
      env:
        CI: true

    - name: Upload commerce gating report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-commerce-gating-report
        path: playwright-report/
        retention-days: 14

